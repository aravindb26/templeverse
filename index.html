<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TempleVerse</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f6f6f6;
        }

        nav{
            background:#ff6b00;
            color:white;
            padding:18px 40px;
            font-size:24px;
            font-weight:bold;
        }

        .hero{
            height:80vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
        }

        h1{
            font-size:56px;
            color:#222;
        }

        p{
            margin-top:15px;
            font-size:20px;
            color:#555;
        }

        input{
            margin-top:35px;
            width:500px;
            max-width:90%;
            padding:16px;
            font-size:18px;
            border-radius:10px;
            border:1px solid #ccc;
        }

        button{
            margin-top:20px;
            background:#ff6b00;
            color:white;
            border:none;
            padding:14px 30px;
            font-size:18px;
            border-radius:8px;
            cursor:pointer;
        }

        button:hover{
            background:#e85f00;
        }

        footer{
            text-align:center;
            padding:30px;
            color:#666;
        }
    </style>

</head>

<body>

<nav>

TempleVerse

</nav>

<section class="hero">

<h1>Discover Temples Across India</h1>

<p>
Find official temple websites, donation links and darshan information.
</p>

<input placeholder="Search temples (Coming Soon)">

<button>Explore</button>

</section>

<footer>

© 2026 TempleVerse

</footer>

</body>
</html>
